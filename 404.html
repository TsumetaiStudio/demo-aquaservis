<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="pool-icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Stránka nenalezena | AquaPool</title>
    <meta name="robots" content="noindex, nofollow">


    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #0c4a6e 0%, #0284c7 50%, #38bdf8 100%);
            color: white;
            text-align: center;
            padding: 24px;
            overflow: hidden;
            position: relative;
        }
        .error-container {
            position: relative;
            z-index: 2;
            max-width: 520px;
        }
        .error-code {
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,0.6) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .error-title {
            font-size: clamp(1.25rem, 3vw, 1.75rem);
            font-weight: 700;
            margin-bottom: 12px;
            color: white;
        }
        .error-text {
            font-size: 1rem;
            color: rgba(255,255,255,0.75);
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: white;
            color: #0c4a6e;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .error-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        /* Bubbles */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            animation: bubble-float 12s ease-in-out infinite;
        }
        .bubble:nth-child(1) { width: 80px; height: 80px; left: 10%; bottom: -80px; animation-duration: 10s; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 50px; height: 50px; left: 30%; bottom: -50px; animation-duration: 14s; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 120px; height: 120px; left: 60%; bottom: -120px; animation-duration: 16s; animation-delay: 1s; }
        .bubble:nth-child(4) { width: 40px; height: 40px; left: 80%; bottom: -40px; animation-duration: 11s; animation-delay: 3s; }
        .bubble:nth-child(5) { width: 60px; height: 60px; left: 45%; bottom: -60px; animation-duration: 13s; animation-delay: 4s; }
        @keyframes bubble-float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
        }
        /* Wave */
        .wave-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            overflow: hidden;
        }
        .wave-bottom svg {
            width: 100%;
            height: 100%;
        }
        @media (prefers-reduced-motion: reduce) {
            .bubble { animation: none; opacity: 0.1; }
        }
    </style>
</head>
<body>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Stránka nenalezena</h1>
        <p class="error-text">Omlouváme se, ale stránka, kterou hledáte, neexistuje nebo byla přesunuta. Zkontrolujte prosím adresu nebo se vraťte na úvodní stránku.</p>
        <a href="index.html" class="error-btn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2.25 6.75L9 1.5l6.75 5.25V15a1.5 1.5 0 01-1.5 1.5h-3V12h-3v4.5h-3a1.5 1.5 0 01-1.5-1.5V6.75z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Zpět na hlavní stránku
        </a>
    </div>

    <div class="wave-bottom">
        <svg viewBox="0 0 1200 80" preserveAspectRatio="none">
            <path d="M0,40 C200,80 400,0 600,40 C800,80 1000,0 1200,40 L1200,80 L0,80 Z" fill="rgba(255,255,255,0.15)"/>
        </svg>
    </div>
</body>
</html>
