<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <!-- Pool rim - outer dark gray ellipse (3D depth) -->
  <ellipse cx="85" cy="88" rx="80" ry="36" fill="#808080"/>
  <!-- Pool rim - top surface lighter -->
  <ellipse cx="85" cy="82" rx="80" ry="36" fill="#a0a0a0"/>
  <!-- Pool rim - inner cutout (creates wide rim border) -->
  <ellipse cx="85" cy="84" rx="62" ry="26" fill="#b0b0b0"/>
  <!-- Water surface -->
  <ellipse cx="85" cy="86" rx="56" ry="22" fill="#1E88E5"/>
  <!-- Water highlight -->
  <ellipse cx="78" cy="82" rx="40" ry="14" fill="#2196F3" opacity="0.7"/>

  <!-- Pool ladder -->
  <!-- Left rail -->
  <line x1="148" y1="22" x2="148" y2="72" stroke="#707070" stroke-width="5" stroke-linecap="round"/>
  <!-- Right rail -->
  <line x1="162" y1="22" x2="162" y2="72" stroke="#707070" stroke-width="5" stroke-linecap="round"/>
  <!-- Top curved handrails -->
  <path d="M148 22 C148 10, 155 8, 155 8 C155 8, 162 10, 162 22" stroke="#707070" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Ladder rungs -->
  <line x1="148" y1="36" x2="162" y2="36" stroke="#707070" stroke-width="4" stroke-linecap="round"/>
  <line x1="148" y1="50" x2="162" y2="50" stroke="#707070" stroke-width="4" stroke-linecap="round"/>
  <line x1="148" y1="64" x2="162" y2="64" stroke="#707070" stroke-width="4" stroke-linecap="round"/>
</svg>
