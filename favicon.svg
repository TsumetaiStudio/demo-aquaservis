<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 70">
  <!-- Pool rim / border -->
  <ellipse cx="50" cy="38" rx="45" ry="18" fill="none" stroke="#6b7280" stroke-width="6" stroke-linecap="round"/>
  <!-- Water surface -->
  <ellipse cx="50" cy="40" rx="34" ry="11" fill="#2196F3"/>
  <!-- Pool ladder - left rail -->
  <path d="M68 12 L68 32" stroke="#6b7280" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Pool ladder - right rail -->
  <path d="M76 12 L76 32" stroke="#6b7280" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Ladder top curve -->
  <path d="M68 12 Q72 6 76 12" stroke="#6b7280" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Ladder rungs -->
  <line x1="68" y1="20" x2="76" y2="20" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="27" x2="76" y2="27" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round"/>
</svg>